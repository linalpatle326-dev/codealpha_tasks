<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player - CodeAlpha Task 3</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="player">
    <h2>CodeAlpha Music Player</h2>

    <div class="img-area">
      <img src="assets/images/cover1.jpg" alt="cover" id="cover">
    </div>

    <div class="song-details">
      <p class="name" id="song-name">Song Name</p>
      <p class="artist" id="artist">Artist</p>
    </div>

    <div class="progress-area">
      <div class="progress-bar" id="progress-bar">
        <span></span>
      </div>
      <div class="timer">
        <span class="current" id="current-time">0:00</span>
        <span class="duration" id="duration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <i id="prev" class="fa-solid fa-backward"></i>
      <i id="play" class="fa-solid fa-play"></i>
      <i id="next" class="fa-solid fa-forward"></i>
    </div>

    <div class="volume">
      <i class="fa-solid fa-volume-high"></i>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
    </div>

    <audio id="audio" src=""></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
